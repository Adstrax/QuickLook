name: Build ImageViewer DLL

on:
  push:
    branches: [ master ]
    paths:
      - 'QuickLook.Plugin/QuickLook.Plugin.ImageViewer/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      run: nuget restore QuickLook.sln
      
    - name: Build ImageViewer plugin
      run: |
        msbuild QuickLook.Plugin/QuickLook.Plugin.ImageViewer/QuickLook.Plugin.ImageViewer.csproj `
          /p:Configuration=Release `
          /p:Platform="Any CPU"

    - name: Upload DLL artifact
      uses: actions/upload-artifact@v4
      with:
        name: QuickLook.Plugin.ImageViewer
        path: |
          QuickLook.Plugin/QuickLook.Plugin.ImageViewer/bin/Release/**/QuickLook.Plugin.ImageViewer.dll
        retention-days: 7
